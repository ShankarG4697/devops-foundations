<VirtualHost *:80>
    ServerName YOUR_EC2_PUBLIC_IP  # e.g. 13.233.45.67 or yourname.duckdns.org

    DocumentRoot /var/www/devops-demo-apache/html

    <Directory /var/www/devops-demo-apache/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/apache2/devops-demo-apache-error.log
    CustomLog /var/log/apache2/devops-demo-apache-access.log combined

</VirtualHost>
